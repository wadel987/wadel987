<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="p-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Tableau de bord</h1>
            <p class="text-gray-500">Bienvenue sur votre interface analytique.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-gray-500 font-medium">Revenus</h3>
                    <i data-lucide="dollar-sign" class="w-5 h-5 text-indigo-600"></i>
                </div>
                <p class="text-2xl font-bold">45,231 €</p>
                <p class="text-sm text-green-600 mt-2">▲ 12.5% vs dernier mois</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-gray-500 font-medium">Utilisateurs</h3>
                    <i data-lucide="users" class="w-5 h-5 text-indigo-600"></i>
                </div>
                <p class="text-2xl font-bold">1,204</p>
                <p class="text-sm text-green-600 mt-2">▲ 4.3% vs dernier mois</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-gray-500 font-medium">Activité</h3>
                    <i data-lucide="activity" class="w-5 h-5 text-indigo-600"></i>
                </div>
                <p class="text-2xl font-bold">89%</p>
                <p class="text-sm text-red-600 mt-2">▼ 1.2% vs dernier mois</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
